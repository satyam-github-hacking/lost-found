{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 shadow-sm">
      <div class="text-center mb-4">
        <i class="bi bi-person-plus text-primary" style="font-size:2.5rem;"></i>
        <h2 class="fw-bold mt-2 mb-1">Create an account</h2>
        <p class="text-muted mb-0">Join Lost &amp; Found to help your community.</p>
      </div>

      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
            <input
              type="{{ field.field.widget.input_type }}"
              name="{{ field.html_name }}"
              id="{{ field.id_for_label }}"
              class="form-control{% if field.errors %} is-invalid{% endif %}"
              placeholder="{{ field.label }}"
              {% if field.value %}value="{{ field.value }}"{% endif %}
              {% if field.html_name == 'username' %}autocomplete="username"{% endif %}
              {% if field.html_name == 'password' %}autocomplete="new-password"{% endif %}
            >
            {% for error in field.errors %}
              <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>
        {% endfor %}

        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
        </div>
      </form>

      <p class="text-center text-muted mt-3 mb-0">
        Already have an account? <a href="{% url 'login' %}">Log in</a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
