{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <div class="mb-3">
        <i class="bi bi-trash3 text-danger" style="font-size:3rem;"></i>
      </div>
      <h3 class="fw-bold mb-1">Delete this item?</h3>
      <p class="text-muted mb-1">You're about to permanently delete:</p>
      <p class="fw-semibold mb-4">"{{ item.title }}"</p>
      <p class="text-muted small mb-4">This action cannot be undone.</p>
      <div class="d-flex justify-content-center gap-3">
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">
            <i class="bi bi-trash me-1"></i>Yes, Delete
          </button>
        </form>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary px-4">Cancel</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
