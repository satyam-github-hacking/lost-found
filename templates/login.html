{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 shadow-sm">
      <div class="text-center mb-4">
        <i class="bi bi-search-heart text-primary" style="font-size:2.5rem;"></i>
        <h2 class="fw-bold mt-2 mb-1">Welcome back</h2>
        <p class="text-muted mb-0">Log in to manage your postings.</p>
      </div>

      {% if error %}
        <div class="alert alert-danger py-2 text-center">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" autocomplete="username">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-primary btn-lg">Login</button>
        </div>
      </form>

      <p class="text-center text-muted mt-3 mb-0">
        Don't have an account? <a href="{% url 'register' %}">Register</a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
